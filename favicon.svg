<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0f172a"/>
      <stop offset="100%" stop-color="#1e293b"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#38bdf8"/>
      <stop offset="100%" stop-color="#818cf8"/>
    </linearGradient>
  </defs>

  <!-- Background rounded square -->
  <rect x="2" y="2" width="60" height="60" rx="14" ry="14" fill="url(#bg)"/>

  <!-- Stylized "A" as intersecting lines — evoking axiom/proof structure -->
  <!-- Left leg -->
  <line x1="16" y1="50" x2="32" y2="14" stroke="url(#accent)" stroke-width="4.5" stroke-linecap="round"/>
  <!-- Right leg -->
  <line x1="48" y1="50" x2="32" y2="14" stroke="url(#accent)" stroke-width="4.5" stroke-linecap="round"/>
  <!-- Crossbar -->
  <line x1="21" y1="38" x2="43" y2="38" stroke="url(#accent)" stroke-width="3.5" stroke-linecap="round"/>

  <!-- Three small nodes on the A — representing data points / research signals -->
  <circle cx="32" cy="14" r="3" fill="#38bdf8"/>
  <circle cx="21" cy="38" r="2.5" fill="#818cf8"/>
  <circle cx="43" cy="38" r="2.5" fill="#818cf8"/>

  <!-- Subtle upward trend line behind the A — finance motif -->
  <polyline points="12,46 22,42 30,44 38,36 46,32 52,28"
    fill="none" stroke="#38bdf8" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" opacity="0.25"/>
</svg>
